<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creatures 3 — Engine Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header id="header">
    <div id="header-left">
      <div id="logo">
        <!-- Marathon-style geometric mark: bold orange square with a cross slit -->
        <div id="logo-mark">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="18" height="18" fill="white" />
            <rect x="9" y="1" width="2" height="18" fill="black" />
            <rect x="1" y="9" width="18" height="2" fill="black" />
          </svg>
        </div>
        <div>
          <div id="logo-title">Creatures 3</div>
          <div id="logo-sub">Engine Monitor</div>
        </div>
      </div>
      <div style="width:20px"></div>
      <div id="status-pill" class="pill pill--disconnected">
        <span class="pill-dot"></span>
        <span id="status-text">Connecting</span>
      </div>
    </div>

    <div id="header-center">
      <div id="stats-bar">
        <div class="stat">
          <span class="stat-val" id="stat-total">0</span>
          <span class="stat-label">Messages</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-errors">0</span>
          <span class="stat-label">Errors</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-fps">—</span>
          <span class="stat-label">Log/s</span>
        </div>
      </div>
    </div>

    <div id="header-right">
      <input id="search" type="text" placeholder="Filter messages…" autocomplete="off" />
      <button id="btn-pause" class="btn">Pause</button>
      <button id="btn-clear" class="btn">Clear</button>
      <button id="btn-copy" class="btn">Copy</button>
      <button id="btn-export" class="btn">Export</button>
    </div>
  </header>

  <!-- ── Category sidebar ────────────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Categories</div>
      <label class="cat-toggle" id="cat-all">
        <input type="checkbox" checked data-mask="0xFFFFFFFF" /> All
      </label>
    </div>

    <div class="sidebar-section">
      <label class="cat-toggle" style="--accent:#DD0000">
        <input type="checkbox" checked data-mask="1" /> <span class="cat-dot"></span> Errors
      </label>
      <label class="cat-toggle" style="--accent:#FF5F00">
        <input type="checkbox" checked data-mask="16" /> <span class="cat-dot"></span> Shutdown
      </label>
      <label class="cat-toggle" style="--accent:#0055FF">
        <input type="checkbox" checked data-mask="2" /> <span class="cat-dot"></span> Network
      </label>
      <label class="cat-toggle" style="--accent:#008000">
        <input type="checkbox" checked data-mask="4" /> <span class="cat-dot"></span> World
      </label>
      <label class="cat-toggle" style="--accent:#7700CC">
        <input type="checkbox" checked data-mask="8" /> <span class="cat-dot"></span> CAOS
      </label>
      <label class="cat-toggle" style="--accent:#007799">
        <input type="checkbox" checked data-mask="32" /> <span class="cat-dot"></span> Sound
      </label>
      <label class="cat-toggle" style="--accent:#FF00FF">
        <input type="checkbox" checked data-mask="64" /> <span class="cat-dot"></span> Crash
      </label>
      <label class="cat-toggle" style="--accent:#555555">
        <input type="checkbox" checked data-mask="0" /> <span class="cat-dot"></span> Other
      </label>
    </div>

    <div class="sidebar-section sidebar-footer">
      <div class="sidebar-title">Display</div>
      <label class="opt-toggle"><input type="checkbox" id="opt-timestamps" checked /> Timestamps</label>
      <label class="opt-toggle"><input type="checkbox" id="opt-autoscroll" checked /> Auto-scroll</label>
      <label class="opt-toggle"><input type="checkbox" id="opt-compact" /> Compact rows</label>
    </div>
  </aside>

  <!-- ── Log output ─────────────────────────────────────────────────────── -->
  <main id="log-container">
    <div id="log-inner">
      <!-- rows injected by JS -->
    </div>
    <div id="scroll-anchor"></div>
  </main>

  <!-- ── Pause overlay ─────────────────────────────────────────────────── -->
  <div id="pause-overlay" hidden>
    <div id="pause-badge">Paused — <span id="pause-buffered">0</span> buffered</div>
  </div>

  <script src="app.js"></script>
</body>

</html>
